name: pfx_reader
description: "Flutter plugin to read PKCS#12 (.pfx/.p12) certificate fields and sign data using the embedded private key. Supports Android and iOS."
version: 1.0.5
homepage: https://github.com/nickolasdeluca/pfx_reader
repository: https://github.com/nickolasdeluca/pfx_reader

environment:
  sdk: ^3.11.5
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.pfx_reader.plugin
        pluginClass: PfxReaderPlugin
      ios:
        pluginClass: PfxReaderPlugin
